# =========================================
# SERVER
# =========================================
server:
  port: ${PORT:8080}  # Render setzt PORT automatisch

# =========================================
# SPRING APPLICATION
# =========================================
spring:
  application:
    name: erp-system-backend

  # ===============================
  # DATASOURCE (PostgreSQL)
  # ===============================
  datasource:
    url: ${DATABASE_URL}  # JDBC URL
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  # ===============================
  # JPA / HIBERNATE
  # ===============================
  jpa:
    hibernate:
      ddl-auto: update
      # create, update, validate, none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true  # Wichtig für automatische Initialisierung

  # ===============================
  # JACKSON
  # ===============================
  jackson:
    serialization:
      indent_output: true

  # ===============================
  # SPRING SECURITY USER (optional, nur für lokale Tests)
  # ===============================
  security:
    user:
      name: ${SPRING_USER}           # Default Benutzer lokal
      password: ${SPRING_PASSWORD}   # Default Passwort lokal

  # ===============================
  # SPRING MAIL (SMTP)
  # ===============================
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# =========================================
# JWT CONFIG
# =========================================
jwt:
  secret: ${JWT_SECRET}
  access-token:
    expiration: 900000      # 15 Minuten
  refresh-token:
    expiration: 604800000   # 7 Tage

# =========================================
# LOGGING
# =========================================
logging:
  level:
    root: INFO
    com.erp.backend: DEBUG
  file:
    name: logs/erp-backend.log

# =========================================
# MANAGEMENT / ACTUATOR
# =========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,httptrace
  endpoint:
    health:
      show-details: always
      mail:
        enabled: false


# =========================================
# CUSTOM APP CONFIGURATION
# =========================================
app:
  init:
    enabled: true                # Init Service aktivieren
    create-test-data: true       # Testdaten erstellen
    auto-run-on-startup: false    # Automatisch beim Start ausführen
  renewal:
    default-extension-months: 12  # Verlängerungsdauer im Batch-Lauf
    batch-lookahead-days: 30      # Vorlauf: Verträge die in X Tagen ablaufen werden verlängert
  notifications:
    email:
      enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
      customer-emails-enabled: ${NOTIFICATION_CUSTOMER_EMAILS_ENABLED:false}
      from: ${NOTIFICATION_EMAIL_FROM:${SMTP_USERNAME:noreply@erp.local}}
      admin-address: ${NOTIFICATION_ADMIN_EMAIL:${SMTP_USERNAME:admin@erp.local}}
    triggers:
      overdue-enabled: ${NOTIFICATION_OVERDUE_ENABLED:true}
      overdue-cron: ${NOTIFICATION_OVERDUE_CRON:0 0 8 * * *}
      expiring-days: ${NOTIFICATION_EXPIRING_DAYS:30}
      expiring-enabled: ${NOTIFICATION_EXPIRING_ENABLED:true}
      invoice-batch-enabled: ${NOTIFICATION_BATCH_ENABLED:true}
      new-entity-enabled: ${NOTIFICATION_NEW_ENTITY_ENABLED:true}
