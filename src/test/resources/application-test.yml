spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  security:
    user:
      name: test
      password: test

# App-spezifische Konfiguration
app:
  init:
    enabled: false

# H2 Console (optional, für Debugging)
h2:
  console:
    enabled: true
    path: /h2-console

# Logging für Tests
logging:
  level:
    com.erp.backend: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# =========================================
# JWT CONFIG
# =========================================
jwt:
  secret: TestSecretKeyFuerJunitTestsMinimal32ZeichenLang!
  access-token:
    expiration: 900000
  refresh-token:
    expiration: 604800000